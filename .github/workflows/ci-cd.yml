name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

env:
  JAVA_VERSION: '8'
  IMAGE_NAME: chatapp

jobs:

  # ── Job 1: Build & Test ─────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --force FETCH_HEAD

      - name: Install Java ${{ env.JAVA_VERSION }} and Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-8-jdk maven
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version
          mvn -version

      - name: Build with Maven
        run: mvn clean compile --no-transfer-progress

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Package JAR
        run: mvn package -DskipTests --no-transfer-progress

      - name: List packaged artifact
        run: ls -lah target || true

  # ── Job 2: Code Quality ─────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --force FETCH_HEAD

      - name: Install Java ${{ env.JAVA_VERSION }} and Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-8-jdk maven
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Run Maven verify
        run: mvn verify --no-transfer-progress -DskipTests

  # ── Job 3: Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only build Docker image on pushes to main/master
    if: github.event_name == 'push'

    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --force FETCH_HEAD

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

  # ── Job 4: Security Scan ────────────────────────────────────────────────────
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --force FETCH_HEAD

      - name: Install Java ${{ env.JAVA_VERSION }} and Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-8-jdk maven
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check --no-transfer-progress || true

      - name: Show OWASP report path
        if: always()
        run: ls -lah target/dependency-check-report.html || true

  # ── Job 5: Deployment Summary ───────────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [ build-and-test, code-quality, docker-build, security-scan ]
    if: always()

    steps:
      - name: Print pipeline summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test    | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality    | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build    | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan   | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
