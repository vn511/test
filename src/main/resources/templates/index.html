<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp — Real-time Messaging</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ── Login overlay ─────────────────────────────────────── */
        #login-page {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }
        #login-page h1 { font-size: 1.8rem; color: #e94560; margin-bottom: 8px; }
        #login-page p  { color: #aaa; margin-bottom: 24px; font-size: .9rem; }
        #login-page input {
            width: 100%; padding: 12px 16px;
            border: 1px solid #0f3460; border-radius: 8px;
            background: #1a1a2e; color: #eee;
            font-size: 1rem; margin-bottom: 16px;
            outline: none;
        }
        #login-page input:focus { border-color: #e94560; }
        #login-page button {
            width: 100%; padding: 12px;
            background: #e94560; color: #fff;
            border: none; border-radius: 8px;
            font-size: 1rem; cursor: pointer;
            transition: background .2s;
        }
        #login-page button:hover { background: #c73652; }

        /* ── Chat page ─────────────────────────────────────────── */
        #chat-page { display: none; width: 100%; max-width: 800px; height: 100vh; flex-direction: column; }

        #chat-header {
            background: #16213e;
            padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        #chat-header h2 { color: #e94560; }
        #online-count { font-size: .85rem; color: #aaa; }

        #message-area {
            flex: 1; overflow-y: auto;
            padding: 20px 24px;
            display: flex; flex-direction: column; gap: 10px;
            background: #1a1a2e;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: .9rem;
            line-height: 1.4;
        }
        .message .sender   { font-weight: 600; font-size: .78rem; margin-bottom: 3px; color: #e94560; }
        .message .time     { font-size: .72rem; color: #888; margin-top: 4px; text-align: right; }
        .message.mine      { align-self: flex-end; background: #0f3460; }
        .message.other     { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; }
        .event-message     {
            align-self: center;
            font-size: .8rem; color: #888;
            background: rgba(255,255,255,.05);
            padding: 4px 12px; border-radius: 999px;
        }

        #message-input-area {
            display: flex; gap: 10px;
            padding: 16px 24px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        #message-input {
            flex: 1; padding: 12px 16px;
            border: 1px solid #0f3460; border-radius: 8px;
            background: #1a1a2e; color: #eee;
            font-size: 1rem; outline: none;
        }
        #message-input:focus { border-color: #e94560; }
        #send-button {
            padding: 12px 20px;
            background: #e94560; color: #fff;
            border: none; border-radius: 8px;
            cursor: pointer; font-size: 1rem;
            transition: background .2s;
        }
        #send-button:hover { background: #c73652; }
        #send-button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────── -->
<div id="login-page">
    <h1>💬 ChatApp</h1>
    <p>Real-time WebSocket messaging</p>
    <input id="username-input" type="text" placeholder="Enter your username" maxlength="30" autocomplete="off">
    <button id="join-button" onclick="connect()">Join Chat</button>
</div>

<!-- ── Chat ───────────────────────────────────────── -->
<div id="chat-page">
    <div id="chat-header">
        <h2>💬 ChatApp</h2>
        <span id="online-count">Connected</span>
    </div>
    <div id="message-area"></div>
    <div id="message-input-area">
        <input id="message-input" type="text" placeholder="Type a message…" autocomplete="off"
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button id="send-button" onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    let stompClient = null;
    let currentUser = null;

    function connect() {
        const usernameInput = document.getElementById('username-input');
        const username = usernameInput.value.trim();
        if (!username) { usernameInput.focus(); return; }
        currentUser = username;

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // suppress console noise

        stompClient.connect({}, function () {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'flex';
            document.getElementById('message-input').focus();

            // Subscribe to public channel
            stompClient.subscribe('/topic/public', function (payload) {
                showMessage(JSON.parse(payload.body));
            });

            // Announce join
            stompClient.send('/app/chat.addUser', {}, JSON.stringify({
                sender: currentUser,
                type: 'JOIN'
            }));
        }, function (error) {
            console.error('Connection error:', error);
        });
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (!content || !stompClient) return;

        stompClient.send('/app/chat.sendMessage', {}, JSON.stringify({
            sender: currentUser,
            content: content,
            type: 'CHAT'
        }));
        input.value = '';
        input.focus();
    }

    function showMessage(message) {
        const area = document.getElementById('message-area');

        if (message.type === 'JOIN' || message.type === 'LEAVE') {
            const el = document.createElement('div');
            el.className = 'event-message';
            el.textContent = message.type === 'JOIN'
                ? `${message.sender} joined the chat`
                : `${message.sender} left the chat`;
            area.appendChild(el);
        } else {
            const isMine = message.sender === currentUser;
            const el = document.createElement('div');
            el.className = 'message ' + (isMine ? 'mine' : 'other');
            el.innerHTML = `
                ${!isMine ? `<div class="sender">${escapeHtml(message.sender)}</div>` : ''}
                <div class="content">${escapeHtml(message.content)}</div>
                <div class="time">${message.timestamp || ''}</div>
            `;
            area.appendChild(el);
        }

        area.scrollTop = area.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }
</script>
</body>
</html>
